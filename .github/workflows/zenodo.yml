name: Upload to Zenodo with submodules

on:
  workflow_dispatch:
    inputs:
      zenodo_record_id:
        description: 'Zenodo record ID for new version (leave empty for first run). Find it in the URL of your Zenodo deposit: https://zenodo.org/records/XXXXXXX or at the end of the DOI: 10.5281/zenodo.XXXXXXX'
        required: false
        default: ''

jobs:
  zenodo-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Create archive
        run: zip -r release.zip . -x "*.git*" -x "*/resources*"

      - name: Build metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os

          repo = os.environ.get("GITHUB_REPOSITORY")
          token = os.environ.get("GH_TOKEN")
          headers = {"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}

          # Get repo info
          req = urllib.request.Request(f"https://api.github.com/repos/{repo}", headers=headers)
          repo_data = json.load(urllib.request.urlopen(req))
          title = repo_data.get("name", "")
          description = repo_data.get("description", "") or ""
          license_id = (repo_data.get("license") or {}).get("spdx_id", "")

          # Get contributors
          req = urllib.request.Request(f"https://api.github.com/repos/{repo}/contributors", headers=headers)
          contributors = json.load(urllib.request.urlopen(req))
          creators = []
          for c in contributors:
            username = c["login"]
            req = urllib.request.Request(f"https://api.github.com/users/{username}", headers=headers)
            user_data = json.load(urllib.request.urlopen(req))
            name = user_data.get("name") or username
            creators.append({"name": name})

          metadata = {
            "metadata": {
              "title": title,
              "upload_type": "software",
              "description": description if description else title,
              "creators": creators
            }
          }
          if license_id and license_id != "NOASSERTION":
            metadata["metadata"]["license"] = license_id.lower()

          print("Metadata:", json.dumps(metadata, indent=2))
          with open("metadata.json", "w") as f:
            json.dump(metadata, f)
          EOF

      - name: Create or update Zenodo deposition
        id: get_id
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          RECORD_ID: ${{ inputs.zenodo_record_id }}
        run: |
          if [ -z "$RECORD_ID" ]; then
            echo "First run: creating new draft..."
            RESPONSE=$(curl -s -X POST \
              "https://zenodo.org/api/deposit/depositions" \
              -H "Authorization: Bearer $ZENODO_TOKEN" \
              -H "Content-Type: application/json" \
              -d @metadata.json)
          else
            echo "Subsequent run: creating new version draft..."
            RESPONSE=$(curl -s -X POST \
              "https://zenodo.org/api/deposit/depositions/$RECORD_ID/actions/newversion" \
              -H "Authorization: Bearer $ZENODO_TOKEN")
            DRAFT_URL=$(echo $RESPONSE | python3 -c 'import sys,json; print(json.load(sys.stdin)["links"]["latest_draft"])')
            RESPONSE=$(curl -s -X GET \
              "$DRAFT_URL" \
              -H "Authorization: Bearer $ZENODO_TOKEN")
            DEPOSITION_ID=$(echo $RESPONSE | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
            curl -s -X PUT \
              "https://zenodo.org/api/deposit/depositions/$DEPOSITION_ID" \
              -H "Authorization: Bearer $ZENODO_TOKEN" \
              -H "Content-Type: application/json" \
              -d @metadata.json
            RESPONSE=$(curl -s -X GET \
              "https://zenodo.org/api/deposit/depositions/$DEPOSITION_ID" \
              -H "Authorization: Bearer $ZENODO_TOKEN")
          fi
          echo "API Response: $RESPONSE"
          DEPOSITION_ID=$(echo $RESPONSE | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          BUCKET_URL=$(echo $RESPONSE | python3 -c 'import sys,json; print(json.load(sys.stdin)["links"]["bucket"])')
          echo "Deposition ID: $DEPOSITION_ID"
          echo "Bucket URL: $BUCKET_URL"
          echo "DEPOSITION_ID=$DEPOSITION_ID" >> $GITHUB_OUTPUT
          echo "BUCKET_URL=$BUCKET_URL" >> $GITHUB_OUTPUT

      - name: Delete old files from new version draft
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          curl -s \
            "https://zenodo.org/api/deposit/depositions/${{ steps.get_id.outputs.DEPOSITION_ID }}/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN" | \
          python3 -c "
          import sys, json, urllib.request
          files = json.load(sys.stdin)
          for f in files:
            file_id = f['id']
            deposition_id = '${{ steps.get_id.outputs.DEPOSITION_ID }}'
            token = '${{ secrets.ZENODO_TOKEN }}'
            req = urllib.request.Request(
              f'https://zenodo.org/api/deposit/depositions/{deposition_id}/files/{file_id}',
              headers={'Authorization': f'Bearer {token}'},
              method='DELETE'
            )
            urllib.request.urlopen(req)
          "

      - name: Upload archive
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          curl -s -X PUT \
            "${{ steps.get_id.outputs.BUCKET_URL }}/release.zip" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            --upload-file release.zip
